name: Deploy static website to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  S3_BUCKET: judo-aws3-project1
  CLOUDWATCH_NAMESPACE: judo-aws3-project1
  APP_NAME: judo-aws3-project1_app

jobs:
  deploy:
    name: Deploy index.html to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "Error: index.html not found"
            exit 1
          fi

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::048333962185:role/GitHubActions2S3Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload index.html to S3
        run: |
          aws s3 cp index.html s3://${{ env.S3_BUCKET }}/index.html

      - name: Publish successful deployment metric
        if: success()
        run: |
          aws cloudwatch put-metric-data \
            --namespace "${{ env.CLOUDWATCH_NAMESPACE }}" \
            --metric-name DeploymentSuccess \
            --dimensions BucketName=${{ env.S3_BUCKET }},Branch=${{ github.ref_name }} \
            --unit Count \
            --value 1

      - name: Publish failed deployment metric
        if: failure()
        run: |
          aws cloudwatch put-metric-data \
            --namespace "${{ env.CLOUDWATCH_NAMESPACE }}" \
            --metric-name DeploymentFailure \
            --dimensions BucketName=${{ env.S3_BUCKET }},Branch=${{ github.ref_name }} \
            --unit Count \
            --value 1