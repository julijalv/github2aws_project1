<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS Deployment Test</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f2937, #2563eb);
      color: white;
    }

    .card {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
    }

    p {
      margin: 8px 0;
      font-size: 18px;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 AWS Deployment Test</h1>
    <p>This static page is running from an AWS S3 bucket. Now with metrics!</p>
    <p>Project: judo-aws3-project1</p>
    <div class="badge">Deployment successful</div>
  </div>
</body>
</html>
